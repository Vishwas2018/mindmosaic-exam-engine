<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="MindMosaic brain mark">
  <defs>
    <linearGradient id="mm-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED" />
      <stop offset="1" stop-color="#5925A8" />
    </linearGradient>
    <linearGradient id="mm-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9A825" />
      <stop offset="1" stop-color="#E06A11" />
    </linearGradient>
    <clipPath id="mm-clip-left">
      <rect x="0" y="0" width="46.5" height="96" rx="0" />
    </clipPath>
    <clipPath id="mm-clip-right">
      <rect x="49.5" y="0" width="46.5" height="96" rx="0" />
    </clipPath>
  </defs>

  <!-- Left hemisphere: overlapping lobes clipped to a straight centre edge -->
  <g clip-path="url(#mm-clip-left)" fill="url(#mm-left)">
    <circle cx="34" cy="26" r="14" />
    <circle cx="21" cy="38" r="13" />
    <circle cx="22" cy="55" r="12" />
    <circle cx="34" cy="66" r="12" />
    <circle cx="44" cy="44" r="17" />
    <circle cx="45" cy="24" r="11" />
    <circle cx="45" cy="64" r="11" />
  </g>
  <!-- Circuit detail -->
  <g stroke="#DDD0F5" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M20 40 L30 40 L34 32" />
    <path d="M26 58 L34 52 L34 44" />
  </g>
  <g fill="#EFE7FB">
    <circle cx="20" cy="40" r="2.6" />
    <circle cx="34" cy="31" r="2.6" />
    <circle cx="26" cy="58" r="2.6" />
    <circle cx="34" cy="43" r="2.6" />
  </g>

  <!-- Right hemisphere with brain stem -->
  <g clip-path="url(#mm-clip-right)" fill="url(#mm-right)">
    <circle cx="62" cy="26" r="14" />
    <circle cx="75" cy="38" r="13" />
    <circle cx="74" cy="55" r="12" />
    <circle cx="62" cy="66" r="12" />
    <circle cx="52" cy="44" r="17" />
    <circle cx="51" cy="24" r="11" />
    <circle cx="51" cy="64" r="11" />
    <path d="M56 70 C58 78 54 84 60 88 L68 84 C63 80 66 74 64 68 Z" />
  </g>
  <!-- Growing branch detail -->
  <g stroke="#8A4B12" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M63 64 C62 52 62 42 63 32" />
    <path d="M63 44 C68 41 71 38 73 34" />
    <path d="M63 52 C58 49 56 46 55 42" />
  </g>
  <g fill="#8A4B12" opacity="0.85">
    <circle cx="73" cy="33" r="2.4" />
    <circle cx="55" cy="41" r="2.4" />
    <circle cx="63" cy="30" r="2.6" />
  </g>
</svg>
